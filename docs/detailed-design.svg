<text x="580.0" y="517.5" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#312e81">USE_LLM + REQUIRE_OPENAI</text>
<rect x="450.0" y="575.0" width="260.0" height="80.0" rx="7" ry="7" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5" />
<text x="580.0" y="611.2" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#312e81">OpenAI interpret()</text>
<text x="580.0" y="627.5" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#312e81">search_query, must_have, avoid</text>
<rect x="820.0" y="575.0" width="240.0" height="80.0" rx="7" ry="7" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" />
<text x="940.0" y="603.1" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#7f1d1d">Strict-mode failure</text>
<text x="940.0" y="619.3" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#7f1d1d">HTTP 503</text>
<text x="940.0" y="635.6" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#7f1d1d">no local fallback</text>
<rect x="450.0" y="685.0" width="260.0" height="80.0" rx="7" ry="7" fill="#fff1f2" stroke="#e11d48" stroke-width="1.5" />
