<rect x="450.0" y="1345.0" width="260.0" height="80.0" rx="7" ry="7" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
<text x="580.0" y="1381.2" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#7c2d12">RecommendResponse</text>
<text x="580.0" y="1397.5" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#7c2d12">provider, latency, scores, products</text>
<rect x="90.0" y="1480.0" width="970.0" height="65.0" rx="7" ry="7" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" />
<text x="100.0" y="1516.8" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" fill="#4b5563">Design invariant: OpenAI interprets intent and writes explanations. Product retrieval always uses the local Amazon Fashion index.</text>
