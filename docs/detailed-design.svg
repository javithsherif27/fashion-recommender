<text x="580.0" y="1059.3" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#78350f">price, rating, listed price, avoid</text>
<text x="580.0" y="1075.6" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#78350f">terms</text>
