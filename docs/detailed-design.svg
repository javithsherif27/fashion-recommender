<text x="580.0" y="1153.1" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#78350f">Rerank and safeguards</text>
<text x="580.0" y="1169.3" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#78350f">audience checks, product boosts,</text>
<text x="580.0" y="1185.6" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#78350f">dedupe</text>
<rect x="450.0" y="1235.0" width="260.0" height="80.0" rx="7" ry="7" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5" />
<text x="580.0" y="1271.2" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#312e81">OpenAI explain_results()</text>
