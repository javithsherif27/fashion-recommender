<text x="580.0" y="407.5" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#064e3b">load products + embeddings once</text>
<rect x="90.0" y="355.0" width="240.0" height="80.0" rx="7" ry="7" fill="#f8fafc" stroke="#64748b" stroke-width="1.5" />
<text x="210.0" y="391.2" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#334155">GET /health</text>
<text x="210.0" y="407.5" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#334155">reports index and LLM status</text>
