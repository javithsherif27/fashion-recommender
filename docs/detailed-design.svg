<text x="80.0" y="66.2" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">Fashion Recommender - Detailed Request Design</text>
<text x="80.0" y="98.7" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" fill="#4b5563">Top-down POST /recommend pipeline. Branches are placed to the side so no connector crosses the main path.</text>
