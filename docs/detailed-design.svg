<text x="580.0" y="847.5" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#064e3b">hashing backend from manifest</text>
<rect x="450.0" y="905.0" width="260.0" height="80.0" rx="7" ry="7" fill="#ecfdf5" stroke="#059669" stroke-width="1.5" />
<text x="580.0" y="941.2" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#064e3b">Vector candidate search</text>
<text x="580.0" y="957.5" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#064e3b">numpy dot product similarity</text>
