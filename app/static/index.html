<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Semantic Fashion Recommender</title>
  <style>
    :root {
      color-scheme: light;
      --canvas: #f4f3ef;
      --panel: #ffffff;
      --ink: #171717;
      --subtle: #5f5b53;
      --line: #d8d3ca;
      --line-strong: #b9b0a2;
      --accent: #245d57;
      --accent-dark: #173f3a;
      --mark: #8a5a12;
      --soft: #ebe7df;
      --warn: #7c2d12;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--canvas);
      color: var(--ink);
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 15px;
      letter-spacing: 0;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      border-bottom: 1px solid var(--line-strong);
      background: #fbfaf7;
    }

    .topbar-inner {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 19px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .brand span {
      color: var(--subtle);
      font-size: 13px;
      white-space: nowrap;
    }

    .system-state {
      display: flex;
      align-items: center;
      gap: 9px;
      color: var(--subtle);
      font-size: 13px;
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--line-strong);
    }

    .dot.ready { background: var(--accent); }
    .dot.error { background: var(--warn); }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 22px auto 36px;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .control-panel,
    .results-panel {
      background: var(--panel);
      border: 1px solid var(--line-strong);
    }

    .control-panel {
      position: sticky;
      top: 18px;
    }

    .panel-head {
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfaf7;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .panel-head span {
      color: var(--subtle);
      font-size: 12px;
    }

    form {
      padding: 14px;
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--subtle);
      font-size: 12px;
      font-weight: 650;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    textarea,
    input {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: 0;
      background: #fff;
      color: var(--ink);
      font: inherit;
      letter-spacing: 0;
      outline: none;
    }

    textarea {
      min-height: 132px;
      resize: vertical;
      padding: 11px 12px;
      line-height: 1.45;
    }

    input {
      height: 38px;
      padding: 0 10px;
    }

    input[type="checkbox"] {
      width: 15px;
      height: 15px;
      margin: 0;
      accent-color: var(--accent);
    }

    textarea:focus,
    input:focus {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--accent);
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .filters label:first-child {
      grid-column: 1 / -1;
    }

    .check-line {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--subtle);
      font-size: 13px;
      font-weight: 600;
      text-transform: none;
      letter-spacing: 0;
    }

    button {
      height: 42px;
      border: 1px solid var(--accent-dark);
      border-radius: 0;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 700;
      letter-spacing: 0;
      cursor: pointer;
    }

    button:hover { background: var(--accent-dark); }
    button:disabled {
      opacity: 0.72;
      cursor: wait;
    }

    .preset-row {
      display: grid;
      gap: 6px;
      padding-top: 2px;
    }

    .preset-button {
      height: auto;
      min-height: 32px;
      padding: 7px 9px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      text-align: left;
      font-size: 13px;
      font-weight: 500;
    }

    .preset-button:hover {
      background: var(--soft);
      border-color: var(--line-strong);
    }

    .results-panel {
      min-height: 560px;
    }

    .status-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      color: var(--subtle);
      font-size: 13px;
    }

    .status-line strong {
      color: var(--ink);
      font-weight: 700;
    }

    .query-readout {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .table {
      display: grid;
    }

    .table-head,
    .result-row {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) 92px 92px 86px;
      gap: 14px;
      align-items: start;
    }

    .table-head {
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      color: var(--subtle);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: #fbfaf7;
    }

    .result-row {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .result-row:last-child { border-bottom: 0; }

    .title {
      margin: 0 0 6px;
      font-size: 15px;
      line-height: 1.35;
      font-weight: 700;
    }

    .store,
    .why {
      color: var(--subtle);
      line-height: 1.45;
    }

    .why {
      margin-top: 8px;
      max-width: 640px;
    }

    .metric {
      color: var(--ink);
      line-height: 1.35;
      font-variant-numeric: tabular-nums;
    }

    .metric span {
      display: block;
      color: var(--subtle);
      font-size: 12px;
      margin-top: 2px;
    }

    .empty-state,
    .error-state {
      padding: 52px 18px;
      color: var(--subtle);
      text-align: center;
      line-height: 1.5;
    }

    .error-state {
      color: var(--warn);
    }

    @media (max-width: 900px) {
      .topbar-inner {
        min-height: 72px;
        align-items: flex-start;
        justify-content: center;
        flex-direction: column;
        padding: 12px 0;
      }

      .brand {
        align-items: flex-start;
        flex-direction: column;
        gap: 3px;
      }

      main {
        grid-template-columns: 1fr;
      }

      .control-panel {
        position: static;
      }
    }

    @media (max-width: 680px) {
      .filters {
        grid-template-columns: 1fr;
      }

      .filters label:first-child {
        grid-column: auto;
      }

      .table-head {
        display: none;
      }

      .result-row {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .result-main {
        grid-column: 1 / -1;
      }

      .status-line {
        grid-template-columns: 1fr;
      }

      .query-readout {
        white-space: normal;
      }
    }

    @media (max-width: 420px) {
      .result-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <h1>Semantic Fashion Recommender</h1>
          <span>Amazon Fashion index</span>
        </div>
        <div class="system-state">
          <span id="stateDot" class="dot"></span>
          <span id="stateText">Checking index</span>
        </div>
      </div>
    </header>

    <main>
      <section class="control-panel" aria-labelledby="searchTitle">
        <div class="panel-head">
          <h2 id="searchTitle">Search</h2>
          <span id="backendLabel">Local</span>
        </div>

        <form id="searchForm">
          <label>
            Request
            <textarea id="query" required>I need an outfit to go to the beach this summer</textarea>
          </label>

          <div class="filters">
            <label>
              Results
              <input id="topK" type="number" min="1" max="20" value="5">
            </label>
            <label>
              Max price
              <input id="maxPrice" type="number" min="0" step="0.01" placeholder="Any">
            </label>
            <label>
              Min rating
              <input id="minRating" type="number" min="0" max="5" step="0.1" placeholder="Any">
            </label>
          </div>

          <label class="check-line">
            <input id="requirePrice" type="checkbox" checked>
            Listed price only
          </label>

          <button id="submitButton" type="submit">Run recommendation</button>

          <div class="preset-row" aria-label="Example queries">
            <button class="preset-button" type="button" data-query="comfortable running socks for training">Running socks for training</button>
            <button class="preset-button" type="button" data-query="a simple office outfit for an interview">Office outfit for interview</button>
            <button class="preset-button" type="button" data-query="lightweight travel clothes for warm weather">Warm weather travel clothes</button>
          </div>
        </form>
      </section>

      <section class="results-panel" aria-labelledby="resultsTitle">
        <div class="panel-head">
          <h2 id="resultsTitle">Recommendations</h2>
          <span id="latencyLabel">Ready</span>
        </div>

        <div class="status-line">
          <div id="queryReadout" class="query-readout">
            Enter a request and run recommendation.
          </div>
          <div id="countReadout">0 results</div>
        </div>

        <div class="table-head" aria-hidden="true">
          <span>Product</span>
          <span>Price</span>
          <span>Rating</span>
          <span>Score</span>
        </div>

        <div id="results" class="table" aria-live="polite">
          <div class="empty-state">No results yet.</div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const form = document.querySelector("#searchForm");
    const button = document.querySelector("#submitButton");
    const results = document.querySelector("#results");
    const stateDot = document.querySelector("#stateDot");
    const stateText = document.querySelector("#stateText");
    const backendLabel = document.querySelector("#backendLabel");
    const latencyLabel = document.querySelector("#latencyLabel");
    const queryReadout = document.querySelector("#queryReadout");
    const countReadout = document.querySelector("#countReadout");
    const queryInput = document.querySelector("#query");

    document.querySelectorAll(".preset-button").forEach((preset) => {
      preset.addEventListener("click", () => {
        queryInput.value = preset.dataset.query;
        queryInput.focus();
      });
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      button.disabled = true;
      button.textContent = "Searching";
      latencyLabel.textContent = "Running";
      results.innerHTML = `<div class="empty-state">Searching local index...</div>`;

      const payload = {
        query: queryInput.value.trim(),
        top_k: Number(document.querySelector("#topK").value || 5),
        filters: {
          max_price: optionalNumber("#maxPrice"),
          min_rating: optionalNumber("#minRating"),
          require_price: document.querySelector("#requirePrice").checked
        }
      };

      try {
        const response = await fetch("/recommend", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || "Request failed");
        }
        renderResults(data);
      } catch (error) {
        latencyLabel.textContent = "Error";
        countReadout.textContent = "0 results";
        results.innerHTML = `<div class="error-state">${escapeHtml(error.message)}</div>`;
      } finally {
        button.disabled = false;
        button.textContent = "Run recommendation";
      }
    });

    checkHealth();

    async function checkHealth() {
      try {
        const response = await fetch("/health");
        const data = await response.json();
        if (!response.ok || !data.index_ready) {
          throw new Error("Index unavailable");
        }
        stateDot.className = "dot ready";
        stateText.textContent = `${Number(data.product_count || 0).toLocaleString()} products indexed`;
        backendLabel.textContent = data.llm_configured ? "LLM enabled" : data.embedding_backend || "Local";
      } catch (error) {
        stateDot.className = "dot error";
        stateText.textContent = "Index unavailable";
        backendLabel.textContent = "Offline";
      }
    }

    function optionalNumber(selector) {
      const value = document.querySelector(selector).value;
      return value === "" ? null : Number(value);
    }

    function renderResults(data) {
      const count = data.recommendations.length;
      latencyLabel.textContent = `${data.latency_ms} ms`;
      countReadout.textContent = `${count} ${count === 1 ? "result" : "results"}`;
      queryReadout.innerHTML = `<strong>Interpreted:</strong> ${escapeHtml(data.interpreted_query)}`;
      backendLabel.textContent = data.llm_used ? data.llm_provider : data.embedding_backend;

      if (count === 0) {
        results.innerHTML = `<div class="empty-state">${escapeHtml(data.message || "No matching products found.")}</div>`;
        return;
      }

      results.innerHTML = data.recommendations.map((item) => `
        <article class="result-row">
          <div class="result-main">
            <h3 class="title">${escapeHtml(item.title)}</h3>
            <div class="store">${escapeHtml(item.store || "Unknown store")}</div>
            <div class="why">${escapeHtml(item.why)}</div>
          </div>
          <div class="metric">${formatPrice(item.price)}<span>USD</span></div>
          <div class="metric">${formatRating(item.average_rating)}<span>${formatCount(item.rating_number)}</span></div>
          <div class="metric">${Number(item.score).toFixed(3)}<span>match</span></div>
        </article>
      `).join("");
    }

    function formatPrice(value) {
      return value == null ? "Not listed" : `$${Number(value).toFixed(2)}`;
    }

    function formatRating(value) {
      return value == null ? "N/A" : Number(value).toFixed(1);
    }

    function formatCount(value) {
      if (value == null) return "no count";
      return `${Number(value).toLocaleString()} ratings`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
